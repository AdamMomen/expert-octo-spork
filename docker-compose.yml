version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: testlab
      POSTGRES_USER: testlab
      POSTGRES_PASSWORD: testlab
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://testlab:testlab@postgres:5432/testlab
      CLOUDFLARE_ACCOUNT_ID: ${CLOUDFLARE_ACCOUNT_ID}
      WORKER_AI_TOKEN: ${WORKER_AI_TOKEN}
      GITHUB_WEBHOOK_SECRET: ${GITHUB_WEBHOOK_SECRET}
    volumes:
      - ./artifacts:/app/artifacts
    depends_on:
      - postgres

  dev:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://testlab:testlab@postgres:5432/testlab
      CLOUDFLARE_ACCOUNT_ID: ${CLOUDFLARE_ACCOUNT_ID}
      WORKER_AI_TOKEN: ${WORKER_AI_TOKEN}
    volumes:
      - .:/app
      - /app/node_modules
      - ./artifacts:/app/artifacts
    depends_on:
      - postgres
    command: npm run dev

volumes:
  postgres_data: